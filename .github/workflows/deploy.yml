# Деплой бэка + web на VPS — по образцу olive_tatoo/.github/workflows/deploy.yml:
# push в main -> SSH на сервер -> git pull -> .env из GitHub Secrets ->
# миграции -> сборка -> рестарт. Traefik публикует: API на ${API_DOMAIN},
# web/PWA на ${WEB_DOMAIN} (+ www). Web-сборке секреты не нужны: публичный
# firebase-config лежит в cbd.mobile-app/.env.web, API base — в build-args.
#
# Секреты репозитория (Settings -> Secrets and variables -> Actions):
#   доступ к серверу: VPS_HOST, VPS_USER, VPS_SSH_KEY, VPS_PORT, GH_PAT
#   приложение (список — cbd.web-api/.env.example, помечены [secret]):
#     GEMINI_API_KEY, JWT_ACCESS_SECRET, JWT_REFRESH_SECRET, POSTGRES_PASSWORD
#     FIREBASE_SERVICE_ACCOUNT (JSON service account ОДНОЙ строкой — web/remote push)
#   опционально: CORS_ORIGIN (дефолт https://cbd-diary.ru)
#
# Предусловия на сервере: репо склонирован в DEPLOY_DIR, стек Traefik
# (~/projects/traefik) запущен и создал внешнюю сеть `proxy`.
name: Deploy to VPS

on:
  push:
    branches: [main]
    paths:
      - 'cbd.web-api/**'
      - 'cbd.mobile-app/**'
      - 'packages/**'
      - 'docker-compose.yml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

env:
  DEPLOY_DIR: /root/cbd-diary

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          envs: GH_PAT,GEMINI_API_KEY,JWT_ACCESS_SECRET,JWT_REFRESH_SECRET,POSTGRES_PASSWORD,CORS_ORIGIN,FIREBASE_SERVICE_ACCOUNT
          script: |
            set -e
            cd ${{ env.DEPLOY_DIR }}
            # Если VPS ходит в GitHub по SSH (deploy key) — GH_PAT не нужен,
            # remote не трогаем; PAT используется только если секрет задан
            if [ -n "${GH_PAT}" ]; then
              git remote set-url origin https://x-access-token:${GH_PAT}@github.com/fkupme/cbd-diary.git
            fi
            git pull origin main

            # service account → base64 одной строкой: в .env НЕЛЬЗЯ многострочные
            # значения (docker compose парсит файл построчно и падает на кавычках
            # JSON). base64 безопасен независимо от того, как вставлен секрет.
            FIREBASE_SA_B64=$(printf '%s' "${FIREBASE_SERVICE_ACCOUNT}" | base64 | tr -d '\n')

            # CORS: канонические origin'ы web (apex+www) гарантируем ВСЕГДА,
            # а значение секрета CORS_ORIGIN (если задано) лишь добавляем —
            # иначе устаревший секрет перебивал дефолт и резал прод по CORS.
            CORS_ALL="https://cbd-diary.ru,https://www.cbd-diary.ru"
            if [ -n "${CORS_ORIGIN}" ]; then CORS_ALL="${CORS_ALL},${CORS_ORIGIN}"; fi

            # .env для docker compose собирается из GitHub Secrets —
            # единственный источник истины, на сервере руками не правится
            cat > .env <<EOF
            POSTGRES_DB=cbd_diary
            POSTGRES_USER=postgres
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
            JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
            GEMINI_API_KEY=${GEMINI_API_KEY}
            GEMINI_MODEL=gemini-2.5-flash
            CORS_ORIGIN=${CORS_ALL}
            API_DOMAIN=api.cbd-diary.ru
            WEB_DOMAIN=cbd-diary.ru
            FIREBASE_SERVICE_ACCOUNT_B64=${FIREBASE_SA_B64}
            EOF
            chmod 600 .env

            # БД и кэш поднимаем первыми
            docker compose --profile production up -d postgres redis

            # Собираем прод-образ API
            docker compose --profile production build api-prod

            # Схема БД: проект ведёт её через prisma db push (как в dev).
            # ВНИМАНИЕ: миграции 20250810_add_chat_tables/20250810_add_chats —
            # пустые файлы, поэтому migrate deploy создал бы БД без chat-таблиц.
            docker compose --profile production run --rm api-prod npx prisma db push --skip-generate

            # Запускаем приложение
            docker compose --profile production up -d --remove-orphans api-prod

            # Web/PWA: собираем и публикуем статику (Traefik отдаёт на WEB_DOMAIN).
            # Секреты не нужны — публичный firebase-config в .env.web, API base в build-args.
            docker compose --profile production build web-prod
            docker compose --profile production up -d web-prod

            docker image prune -f
            echo "=== CBD Diary API + Web deployed ==="
            docker compose --profile production ps
