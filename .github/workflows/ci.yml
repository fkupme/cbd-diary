name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'cbd.web-api/**'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'cbd.web-api/**'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cbd.web-api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cbd.web-api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build
        run: npm run build

      - name: Docker image builds
        working-directory: .
        run: docker build -t cbd-api-ci -f cbd.web-api/Dockerfile cbd.web-api
