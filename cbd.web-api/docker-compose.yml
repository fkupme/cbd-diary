version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: cbd-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cbd_diary}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_HOST_AUTH_METHOD: ${POSTGRES_HOST_AUTH_METHOD:-trust}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-cbd_diary}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cbd-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cbd-api
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL_DOCKER:-postgresql://postgres:password@postgres:5432/cbd_diary?schema=public}
      CORS_ORIGIN: ${CORS_ORIGIN_DOCKER:-http://localhost:5173}
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${APP_PORT:-3002}
      # Передаём POSTGRES_* для PrismaService, который собирает url из этих переменных
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-cbd_diary}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRE: ${JWT_ACCESS_EXPIRE:-15m}
      JWT_REFRESH_EXPIRE: ${JWT_REFRESH_EXPIRE:-7d}
      APP_API_PREFIX: ${APP_API_PREFIX:-api}
      APP_API_VERSION: ${APP_API_VERSION:-v1}
    command: sh -lc "npx prisma migrate deploy && npx prisma generate && node dist/main.js"
    ports:
      - '${APP_PORT:-3002}:${APP_PORT:-3002}'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  prisma-studio:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cbd-prisma-studio
    command: sh -lc "npx prisma generate && npx prisma studio --hostname 0.0.0.0 --port 5555"
    ports:
      - '5555:5555'
    environment:
      DATABASE_URL: ${DATABASE_URL_DOCKER:-postgresql://postgres:password@postgres:5432/cbd_diary?schema=public}
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy

  adminer:
    image: adminer:latest
    container_name: cbd-adminer
    restart: unless-stopped
    ports:
      - '8080:8080'
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data:
